<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 Generator</title>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 600px; margin: 0 auto; }
        input { padding: 10px; width: 100%; font-size: 16px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px; }
        pre { background: #f0f0f0; padding: 10px; word-wrap: break-word; }
    </style>
</head>
<body>
    <h2>Генератор SHA-256 хэша</h2>
    <p>Код выполняется локально. Пароль не передаётся.</p>

    <input type="password" id="password" placeholder="Введите пароль">
    <button onclick="generate()">Сгенерировать хэш</button>
    <button onclick="copyHash()">Копировать</button>

    <h3>Результат:</h3>
    <pre id="result"></pre>
    <p id="status"></p>

    <script>
    async function generate() {
        const pass = document.getElementById('password').value;
        if (!pass) {
            document.getElementById('status').textContent = 'Введите пароль';
            return;
        }
        document.getElementById('status').textContent = 'Генерирую...';
        
        // Добавляем соль и хэшируем
        const salt = "MobileMoney_Salt_2026";
        const combined = pass + salt;
        
        const msgBuffer = new TextEncoder().encode(combined);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        document.getElementById('result').textContent = hashHex;
        document.getElementById('status').textContent = 'Готово! Скопируйте хэш и вставьте в БД.';
    }

    function copyHash() {
        const hash = document.getElementById('result').textContent;
        if (hash) {
            navigator.clipboard.writeText(hash);
            document.getElementById('status').textContent = 'Скопировано!';
        }
    }
    </script>
</body>
</html>
