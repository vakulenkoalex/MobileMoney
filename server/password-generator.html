<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 Generator</title>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 600px; margin: 0 auto; }
        input { padding: 10px; width: 100%; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 5px; margin-bottom: 10px; }
        pre { background: #f0f0f0; padding: 10px; word-wrap: break-word; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .field { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>Генератор хэша пароля</h2>
    <p>Код выполняется локально. Пароль и соль не передаются.</p>

    <div class="field">
        <label>Пароль:</label>
        <input type="text" id="password" placeholder="Введите пароль">
    </div>

    <div class="field">
        <label>Соль (или оставьте пустым для случайной):</label>
        <input type="text" id="salt" placeholder="Введите соль">
        <button type="button" onclick="generateSalt()">Сгенерировать соль</button>
    </div>

    <div class="field">
        <label>Алгоритм:</label>
        <select id="algo">
            <option value="SHA-256" selected>SHA-256</option>
            <option value="SHA-512">SHA-512</option>
        </select>
    </div>

    <button type="button" onclick="generate()">Сгенерировать хэш</button>
    <button type="button" onclick="copyAll()">Копировать всё</button>

    <h3>Результат:</h3>
    <pre id="result"></pre>
    <p id="status"></p>

    <script>
    async function generateHash(text, algo) {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        const hashBuffer = await crypto.subtle.digest(algo, data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function generateSalt() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let salt = '';
        for (let i = 0; i < 16; i++) {
            salt += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('salt').value = salt;
    }

    async function generate() {
        const pass = document.getElementById('password').value;
        const salt = document.getElementById('salt').value;
        const algo = document.getElementById('algo').value;

        if (!pass) {
            document.getElementById('status').textContent = 'Введите пароль';
            return;
        }

        document.getElementById('status').textContent = 'Генерирую...';

        const combined = pass + (salt || '');
        const hashHex = await generateHash(combined, algo);

        const result = 'password_hash: ' + hashHex + '\nsalt: ' + (salt || '(пустая)');
        document.getElementById('result').textContent = result;
        document.getElementById('status').textContent = 'Готово! Скопируйте данные и вставьте в БД.';
    }

    function copyAll() {
        const result = document.getElementById('result').textContent;
        if (result) {
            navigator.clipboard.writeText(result);
            document.getElementById('status').textContent = 'Скопировано!';
        }
    }
    </script>
</body>
</html>
