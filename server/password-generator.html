<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 Generator</title>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 600px; margin: 0 auto; }
        input { padding: 10px; width: 100%; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 5px; margin-bottom: 10px; }
        pre { background: #f0f0f0; padding: 10px; word-wrap: break-word; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .field { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>Генератор хэша пароля</h2>
    <p>Код выполняется локально. Пароль и соль не передаются.</p>

    <div class="field">
        <label>Пароль:</label>
        <input type="password" id="password" placeholder="Введите пароль">
    </div>

    <div class="field">
        <label>Соль (или оставьте пустым для случайной):</label>
        <input type="text" id="salt" placeholder="Введите соль">
        <button type="button" onclick="generateSalt()">Сгенерировать соль</button>
    </div>

    <button type="button" onclick="generate()">Сгенерировать хэш</button>
    <button type="button" onclick="copyAll()">Копировать всё</button>

    <h3>Результат:</h3>
    <pre id="result"></pre>
    <p id="status"></p>

    <script>
    function generateSalt() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let salt = '';
        for (let i = 0; i < 16; i++) {
            salt += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('salt').value = salt;
    }

    function sha256(str) {
        const rotateRight = (n, s) => (n >>> s) | (n << (32 - s));
        const ch = (x, y, z) => ((x & y) ^ (~x & z));
        const maj = (x, y, z) => ((x & y) ^ (x & z) ^ (y & z));
        const sigma0 = (x) => rotateRight(x, 2) ^ rotateRight(x, 13) ^ rotateRight(x, 22);
        const sigma1 = (x) => rotateRight(x, 6) ^ rotateRight(x, 11) ^ rotateRight(x, 25);
        const gamma0 = (x) => rotateRight(x, 7) ^ rotateRight(x, 18) ^ (x >>> 3);
        const gamma1 = (x) => rotateRight(x, 17) ^ rotateRight(x, 19) ^ (x >>> 10);

        const k = [
            0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
            0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
            0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
            0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
            0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
            0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
            0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
            0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
        ];

        const bytes = [];
        for (let i = 0; i < str.length; i++) {
            bytes.push(str.charCodeAt(i));
        }

        bytes.push(0x80);
        while ((bytes.length % 64) !== 56) bytes.push(0);
        const bitLen = str.length * 8;
        for (let i = 7; i >= 0; i--) bytes.push((bitLen >> (i * 8)) & 0xff);

        let h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
        let h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;

        for (let chunk = 0; chunk < bytes.length; chunk += 64) {
            const w = new Array(64);
            for (let i = 0; i < 16; i++) {
                w[i] = (bytes[chunk + i * 4] << 24) | (bytes[chunk + i * 4 + 1] << 16) |
                       (bytes[chunk + i * 4 + 2] << 8) | bytes[chunk + i * 4 + 3];
            }
            for (let i = 16; i < 64; i++) {
                w[i] = gamma1(w[i - 2]) + w[i - 7] + gamma0(w[i - 15]) + w[i - 16];
            }

            let a = h0, b = h1, c = h2, d = h3, e = h4, f = h5, g = h6, h = h7;

            for (let i = 0; i < 64; i++) {
                const t1 = h + sigma1(e) + ch(e, f, g) + k[i] + w[i];
                const t2 = sigma0(a) + maj(a, b, c);
                h = g; g = f; f = e; e = d + t1;
                d = c; c = b; b = a; a = t1 + t2;
            }

            h0 += a; h1 += b; h2 += c; h3 += d; h4 += e; h5 += f; h6 += g; h7 += h;
        }

        return (h0.toString(16).padStart(8, '0') +
                h1.toString(16).padStart(8, '0') +
                h2.toString(16).padStart(8, '0') +
                h3.toString(16).padStart(8, '0') +
                h4.toString(16).padStart(8, '0') +
                h5.toString(16).padStart(8, '0') +
                h6.toString(16).padStart(8, '0') +
                h7.toString(16).padStart(8, '0'));
    }

    function generate() {
        const pass = document.getElementById('password').value;
        const salt = document.getElementById('salt').value;

        if (!pass) {
            document.getElementById('status').textContent = 'Введите пароль';
            return;
        }

        document.getElementById('status').textContent = 'Генерирую...';

        const combined = pass + (salt || '');
        const hashHex = sha256(combined);

        const result = 'password_hash: ' + hashHex + '\nsalt: ' + (salt || '(пустая)');
        document.getElementById('result').textContent = result;
        document.getElementById('status').textContent = 'Готово! Скопируйте данные и вставьте в БД.';
    }

    function copyAll() {
        const result = document.getElementById('result').textContent;
        if (result) {
            navigator.clipboard.writeText(result);
            document.getElementById('status').textContent = 'Скопировано!';
        }
    }
    </script>
</body>
</html>
